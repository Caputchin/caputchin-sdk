name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      # release-please release PRs bump package.json versions without refreshing
      # pnpm-lock.yaml; running `pnpm install` (no --frozen-lockfile) lets CI
      # reconcile on those PRs. Trade-off: dev PRs lose the "forgot-to-commit
      # lockfile" guard. Restore --frozen-lockfile if release-please ever gains
      # pnpm-lock support.
      - run: pnpm install

      - run: pnpm typecheck

      - run: pnpm build

      # The committed packages/*/docs/ reference is generated from source TSDoc
      # by `pnpm run docs`. Regenerate and fail if it drifts, so a TSDoc edit
      # that wasn't re-generated can't land stale docs. Runs AFTER `pnpm build`:
      # cross-package re-exports (e.g. engine-kit re-exporting
      # replay-contract's ReplayConfig) resolve their TSDoc from the built
      # `.d.ts`, so docs must regenerate against a fresh dist to match the
      # committed output deterministically.
      - name: SDK reference docs are in sync with source
        run: |
          pnpm run docs
          changes="$(git status --porcelain -- packages/*/docs kits/*/docs)"
          if [ -n "$changes" ]; then
            echo "$changes"
            echo "::error::Committed SDK reference docs are stale (modified or new pages above). Run 'pnpm build && pnpm run docs' and commit the result."
            exit 1
          fi

      - name: Coverage
        run: pnpm coverage

  # The Rust kit (kits/replay-rs) is a separate toolchain from the pnpm lane
  # above; its own job keeps cargo off the node critical path. Mirrors the rust
  # setup in the caputchin-games CI (dtolnay toolchain + Swatinem cache).
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check -p caputchin-replay-rs
      - run: cargo clippy -p caputchin-replay-rs --all-targets -- -D warnings
      - run: cargo test -p caputchin-replay-rs
      # The crate's reason for existing is a freestanding C-ABI wasm; prove it builds for that target.
      - run: cargo build -p caputchin-replay-rs --target wasm32-unknown-unknown
