name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # release-please release PRs bump package.json versions without refreshing
      # pnpm-lock.yaml; running `pnpm install` (no --frozen-lockfile) lets CI
      # reconcile on those PRs. Trade-off: dev PRs lose the "forgot-to-commit
      # lockfile" guard. Restore --frozen-lockfile if release-please ever gains
      # pnpm-lock support.
      - run: pnpm install

      - run: pnpm typecheck

      - run: pnpm build

      - name: Coverage
        run: pnpm coverage

      - run: pnpm size
        name: Size limit
