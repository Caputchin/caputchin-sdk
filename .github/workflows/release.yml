name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      replay_contract_released: ${{ steps.release.outputs['packages/replay-contract--release_created'] }}
      determinism_released: ${{ steps.release.outputs['kits/determinism--release_created'] }}
      replay_wasm_released: ${{ steps.release.outputs['kits/replay-wasm--release_created'] }}
      engine_kit_released: ${{ steps.release.outputs['kits/engine-kit--release_created'] }}
      replay_selfcheck_released: ${{ steps.release.outputs['kits/replay-selfcheck--release_created'] }}
      replay_rs_released: ${{ steps.release.outputs['kits/replay-rs--release_created'] }}
      preset_melonjs_released: ${{ steps.release.outputs['presets/melonjs--release_created'] }}
      preset_phaser_released: ${{ steps.release.outputs['presets/phaser--release_created'] }}
      preset_kaplay_released: ${{ steps.release.outputs['presets/kaplay--release_created'] }}
      preset_excalibur_released: ${{ steps.release.outputs['presets/excalibur--release_created'] }}
      game_sdk_released: ${{ steps.release.outputs['packages/game-sdk--release_created'] }}
      widget_released: ${{ steps.release.outputs['packages/widget--release_created'] }}
      mcp_released: ${{ steps.release.outputs['packages/mcp--release_created'] }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
          registry-url: https://registry.npmjs.org
          always-auth: true

      # release-please bumps package.json versions but does not refresh
      # pnpm-lock.yaml, so the lockfile drifts on the release commit.
      # `pnpm install` (no --frozen-lockfile) reconciles before publish.
      - run: pnpm install
      - run: pnpm build

      # Publish in dependency order: replay-contract (the mandatory contract) is
      # depended on by engine-kit + game-sdk, so it goes first.
      - name: Publish @caputchin/replay-contract
        if: ${{ needs.release-please.outputs.replay_contract_released == 'true' }}
        run: pnpm --filter @caputchin/replay-contract publish --access public --no-git-checks

      # determinism has no intra-repo deps; engine-kit + the presets depend on
      # it, so it publishes before them.
      - name: Publish @caputchin/determinism
        if: ${{ needs.release-please.outputs.determinism_released == 'true' }}
        run: pnpm --filter @caputchin/determinism publish --access public --no-git-checks

      - name: Publish @caputchin/replay-wasm
        if: ${{ needs.release-please.outputs.replay_wasm_released == 'true' }}
        run: pnpm --filter @caputchin/replay-wasm publish --access public --no-git-checks

      # replay-selfcheck depends on replay-contract + determinism (both above) and
      # is depended on by engine-kit, so it publishes between them.
      - name: Publish @caputchin/replay-selfcheck
        if: ${{ needs.release-please.outputs.replay_selfcheck_released == 'true' }}
        run: pnpm --filter @caputchin/replay-selfcheck publish --access public --no-git-checks

      - name: Publish @caputchin/engine-kit
        if: ${{ needs.release-please.outputs.engine_kit_released == 'true' }}
        run: pnpm --filter @caputchin/engine-kit publish --access public --no-git-checks

      # preset-melonjs depends on engine-kit, so it publishes after it.
      - name: Publish @caputchin/preset-melonjs
        if: ${{ needs.release-please.outputs.preset_melonjs_released == 'true' }}
        run: pnpm --filter @caputchin/preset-melonjs publish --access public --no-git-checks

      # preset-phaser is standalone (no engine-kit dep); it only needs
      # replay-contract, already published above.
      - name: Publish @caputchin/preset-phaser
        if: ${{ needs.release-please.outputs.preset_phaser_released == 'true' }}
        run: pnpm --filter @caputchin/preset-phaser publish --access public --no-git-checks

      # preset-kaplay is self-contained (no engine-kit dep); it only needs
      # replay-contract, already published above.
      - name: Publish @caputchin/preset-kaplay
        if: ${{ needs.release-please.outputs.preset_kaplay_released == 'true' }}
        run: pnpm --filter @caputchin/preset-kaplay publish --access public --no-git-checks

      # preset-excalibur is self-contained (no engine-kit dep); it only needs
      # replay-contract + determinism, already published above.
      - name: Publish @caputchin/preset-excalibur
        if: ${{ needs.release-please.outputs.preset_excalibur_released == 'true' }}
        run: pnpm --filter @caputchin/preset-excalibur publish --access public --no-git-checks

      - name: Publish @caputchin/game-sdk
        if: ${{ needs.release-please.outputs.game_sdk_released == 'true' }}
        run: pnpm --filter @caputchin/game-sdk publish --access public --no-git-checks

      - name: Publish @caputchin/widget
        if: ${{ needs.release-please.outputs.widget_released == 'true' }}
        run: pnpm --filter @caputchin/widget publish --access public --no-git-checks

      - name: Publish @caputchin/mcp
        if: ${{ needs.release-please.outputs.mcp_released == 'true' }}
        run: pnpm --filter @caputchin/mcp publish --access public --no-git-checks

  # The Rust kit publishes to crates.io, a separate registry + toolchain from the
  # npm publish job above. Gated on its own release-please output; needs a
  # CARGO_REGISTRY_TOKEN secret (the org's first crates.io credential). It has no
  # intra-repo deps, so it runs independently of the ordered npm publish.
  publish-crate:
    needs: release-please
    if: ${{ needs.release-please.outputs.replay_rs_released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish caputchin-replay-rs to crates.io
        working-directory: kits/replay-rs
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
