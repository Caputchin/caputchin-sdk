name: skills

# Validates the public Caputchin agent skills against the agentskills.io spec on
# every change, and auto-publishes a skills release whenever the skills change on
# main. Uses GitHub's first-party `gh skill` (no external account or token: it
# authenticates with the workflow's built-in GITHUB_TOKEN).
# See plugins/caputchin/PUBLISHING.md for the full distribution plan.

on:
  push:
    branches: [main]
    paths:
      - "plugins/caputchin/skills/**"
      - ".claude-plugin/**"
      - ".github/workflows/publish-skills.yml"
  pull_request:
    paths:
      - "plugins/caputchin/skills/**"
      - ".claude-plugin/**"
      - ".github/workflows/publish-skills.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skills against the agentskills.io spec
        env:
          GH_TOKEN: ${{ github.token }}
        # Discovers plugins/{scope}/skills/*/SKILL.md and checks names, required
        # frontmatter, and metadata. Warnings (repo security settings) do not fail.
        run: gh skill publish --dry-run

  publish:
    needs: validate
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: skills-v${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Publish skills release and attach .skill archives
        # Creates an immutable GitHub release tagged skills-v<run>, namespaced
        # apart from release-please's package tags (mcp-v*, widget-v*). Idempotent:
        # a workflow re-run reuses run_number, so skip if the release already exists
        # instead of failing. --tag is non-interactive and the agent-skills topic is
        # already set on the repo, so no administration:write (topic PUT) is needed;
        # contents:write covers the release create + asset upload.
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists (re-run); skipping."
            exit 0
          fi
          gh skill publish --tag "$TAG"
          mkdir -p dist-skills
          for dir in plugins/caputchin/skills/*/; do
            name="$(basename "$dir")"
            (cd "$dir" && zip -r "$GITHUB_WORKSPACE/dist-skills/${name}.skill" . -x '*/evals/*' '*.pyc')
          done
          gh release upload "$TAG" dist-skills/*.skill --clobber
