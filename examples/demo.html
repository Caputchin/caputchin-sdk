<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caputchin Playground — Widget &amp; Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0 auto;
      padding: 1.5rem;
      background: #f8f7ff;
      color: #1a0a2e;
      max-width: 56rem;
    }
    h1 { color: #3d2a5e; margin-bottom: 0.25rem; }
    p.subtitle { color: #6a4c93; margin-top: 0; margin-bottom: 1.5rem; font-size: 0.9rem; }
    h2 { margin: 1.5rem 0 0.5rem; font-size: 1rem; color: #3d2a5e; border-bottom: 1px solid #e0d9f5; padding-bottom: 0.25rem; }

    .tabs {
      display: flex; gap: 0.4rem; margin-bottom: 1rem;
      border-bottom: 2px solid #e0d9f5;
    }
    .tab {
      background: none; border: 0; padding: 0.6rem 1.2rem;
      font: inherit; font-weight: 600; font-size: 0.95rem;
      color: #6a4c93; cursor: pointer;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
    }
    .tab.active { color: #2F6640; border-bottom-color: #2F6640; }

    .section {
      background: #fff; border: 1px solid #e0d9f5; border-radius: 12px;
      padding: 1rem 1.25rem; margin-bottom: 1rem;
    }

    .presets { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .preset {
      font-size: 0.75rem; padding: 0.3rem 0.6rem;
      border: 1px solid #6a4c93; background: #fff; color: #3d2a5e;
      border-radius: 999px; cursor: pointer;
    }
    .preset:hover { background: #f0ebff; }

    .controls {
      display: grid; gap: 0.75rem 1rem;
      grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr));
    }
    .field { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.8rem; }
    .field label { color: #555; font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .field select, .field input, .field textarea {
      font: inherit; font-size: 0.85rem; padding: 0.4rem 0.5rem;
      border: 1px solid #ccc; border-radius: 6px; background: #fff;
    }
    .field textarea { min-height: 2.5rem; resize: vertical; }
    .row { display: flex; gap: 0.5rem; align-items: center; }
    .row input[type="number"] { flex: 1 1 auto; }
    .row select { flex: 0 0 auto; }

    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }
    .actions button {
      font-size: 0.85rem; padding: 0.5rem 1rem;
      border-radius: 6px; border: 0; cursor: pointer;
    }
    button.primary { background: #2F6640; color: #fff; }
    button.primary:hover { background: #1f4a2c; }
    button.secondary { background: #fff; color: #3d2a5e; border: 1px solid #6a4c93; }
    button.secondary:hover { background: #f0ebff; }

    .code {
      font-family: ui-monospace, "SF Mono", monospace; font-size: 0.75rem;
      background: #1A1917; color: #E0F2DA; padding: 0.6rem 0.8rem;
      border-radius: 6px; position: relative; overflow-x: auto;
    }
    .code button.copy {
      position: absolute; top: 0.3rem; right: 0.3rem;
      background: #2F6640; color: #fff; border: 0; font-size: 0.7rem;
      padding: 0.15rem 0.5rem; border-radius: 4px; cursor: pointer;
    }

    .mount { display: flex; flex-direction: column; gap: 0.75rem; }
    .mount form { display: flex; flex-direction: column; gap: 0.5rem; }
    .mount form input[type="text"] {
      border: 1px solid #ccc; border-radius: 6px; padding: 0.4rem 0.6rem;
      font-size: 0.85rem; max-width: 16rem;
    }
    .mount form button[type="submit"] {
      padding: 0.4rem 0.8rem; font-size: 0.85rem;
      background: #2F6640; color: #fff; border: 0;
      border-radius: 6px; cursor: pointer; max-width: 8rem;
    }
    .manual-controls { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .manual-controls button {
      font-size: 0.75rem; padding: 0.3rem 0.6rem;
      border: 1px solid #6a4c93; background: #fff; color: #3d2a5e;
      border-radius: 6px; cursor: pointer;
    }

    .log {
      font-family: ui-monospace, "SF Mono", monospace; font-size: 0.7rem;
      background: #1A1917; color: #E0F2DA;
      padding: 0.6rem 0.8rem; border-radius: 6px;
      min-height: 6rem; max-height: 20rem; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
    }
    .log .ts { color: #aaa; margin-right: 0.4rem; }
    .log .ev-start { color: #82cfff; }
    .log .ev-pass { color: #6fe86f; }
    .log .ev-nickname { color: #ffc870; }
    .log .ev-error { color: #ff7070; }
    .log .ev-layout-resolved { color: #c0a8ff; }
    .log .ev-submit { color: #aaa; }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <h1>Caputchin Playground</h1>
  <p class="subtitle">
    Two widgets, two tabs. Pick a preset to jump in. Sitekey:
    <code>cpt_pub_WVQVqTdVl92Sh_bxokoz_wCw</code>.
  </p>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="widget" type="button">&lt;caputchin-widget&gt; (cap)</button>
    <button class="tab" data-tab="game" type="button">&lt;caputchin-game&gt;</button>
  </div>

  <!-- ============================================================
       <caputchin-widget> PANEL
       ============================================================ -->
  <div class="panel active" id="panel-widget">
    <section class="section">
      <h2>Presets</h2>
      <div class="presets" id="widget-presets"></div>
    </section>

    <section class="section">
      <h2>Settings</h2>
      <div class="controls">
        <div class="field">
          <label for="w-mode">mode</label>
          <select id="w-mode">
            <option value="invisible">invisible</option>
            <option value="simple" selected>simple</option>
          </select>
        </div>
        <div class="field">
          <label for="w-trigger">trigger</label>
          <select id="w-trigger">
            <option value="auto" selected>auto</option>
            <option value="click">click</option>
            <option value="form-submit">form-submit</option>
            <option value="manual">manual</option>
          </select>
        </div>
        <div class="field">
          <label for="w-size">size</label>
          <select id="w-size">
            <option value="normal" selected>normal</option>
            <option value="compact">compact</option>
          </select>
        </div>
        <div class="field">
          <label for="w-width-mode">width</label>
          <div class="row">
            <select id="w-width-mode">
              <option value="auto" selected>auto</option>
              <option value="full">full</option>
              <option value="pixels">pixels</option>
            </select>
            <input id="w-width-px" type="number" min="1" placeholder="e.g. 500" disabled />
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="primary" id="w-apply">Apply &amp; remount</button>
        <button class="secondary" id="w-reset">Reset</button>
      </div>
    </section>

    <section class="section">
      <h2>Markup</h2>
      <div class="code"><button class="copy" data-copy="widget">copy</button><span id="w-code"></span></div>
    </section>

    <section class="section">
      <h2>Widget</h2>
      <div class="mount" id="w-mount"></div>
    </section>

    <section class="section">
      <h2>Events</h2>
      <div class="log" id="w-log"></div>
    </section>
  </div>

  <!-- ============================================================
       <caputchin-game> PANEL
       ============================================================ -->
  <div class="panel" id="panel-game">
    <section class="section">
      <h2>Presets</h2>
      <div class="presets" id="game-presets"></div>
    </section>

    <section class="section">
      <h2>Settings</h2>
      <div class="controls">
        <div class="field">
          <label for="g-sitekey-mode">sitekey</label>
          <select id="g-sitekey-mode">
            <option value="present" selected>present (play + verify)</option>
            <option value="absent">absent (game-only)</option>
          </select>
        </div>
        <div class="field">
          <label for="g-trigger">trigger</label>
          <select id="g-trigger">
            <option value="auto" selected>auto</option>
            <option value="click">click</option>
            <option value="form-submit">form-submit</option>
            <option value="manual">manual (customer-hosted)</option>
          </select>
        </div>
        <div class="field">
          <label for="g-layout">layout</label>
          <select id="g-layout">
            <option value="auto" selected>auto</option>
            <option value="inline">inline</option>
            <option value="modal">modal</option>
            <option value="fullscreen">fullscreen</option>
          </select>
        </div>
        <div class="field">
          <label for="g-size">size</label>
          <select id="g-size">
            <option value="normal" selected>normal</option>
            <option value="compact">compact</option>
          </select>
        </div>
        <div class="field">
          <label for="g-width-mode">width</label>
          <div class="row">
            <select id="g-width-mode">
              <option value="auto" selected>auto</option>
              <option value="full">full</option>
              <option value="pixels">pixels</option>
            </select>
            <input id="g-width-px" type="number" min="1" placeholder="e.g. 500" disabled />
          </div>
        </div>
        <div class="field">
          <label for="g-height-px">height (px, blank = auto)</label>
          <input id="g-height-px" type="number" min="1" placeholder="e.g. 300" />
        </div>
        <div class="field">
          <label for="g-game">game</label>
          <select id="g-game">
            <option value="@demo/simple" selected>@demo/simple — click 3x to pass</option>
            <option value="@demo/multi-round">@demo/multi-round — 3 rounds</option>
            <option value="@demo/failing">@demo/failing — bridge.error after 1.5s</option>
          </select>
        </div>
        <div class="field">
          <label for="g-games">games (comma-sep, overrides game)</label>
          <textarea id="g-games" placeholder="@demo/simple,@demo/multi-round"></textarea>
        </div>
      </div>
      <div class="actions">
        <button class="primary" id="g-apply">Apply &amp; remount</button>
        <button class="secondary" id="g-reset">Reset</button>
      </div>
    </section>

    <section class="section">
      <h2>Markup</h2>
      <div class="code"><button class="copy" data-copy="game">copy</button><span id="g-code"></span></div>
    </section>

    <section class="section">
      <h2>Widget</h2>
      <div class="mount" id="g-mount"></div>
    </section>

    <section class="section">
      <h2>Events</h2>
      <div class="log" id="g-log"></div>
    </section>
  </div>

  <script>
    const SITEKEY = 'cpt_pub_WVQVqTdVl92Sh_bxokoz_wCw';
    const GAME_SRC = {
      '@demo/simple': '/examples/simple-game.js',
      '@demo/multi-round': '/examples/multi-round-game.js',
      '@demo/failing': '/examples/failing-game.js',
    };

    // ---------- URL state ----------
    function readUrl() {
      const p = new URLSearchParams(location.search);
      return {
        tab: p.get('tab') || 'widget',
        // widget state
        wMode: p.get('w.mode') || 'simple',
        wTrigger: p.get('w.trigger') || 'auto',
        wSize: p.get('w.size') || 'normal',
        wWidthMode: p.get('w.widthMode') || 'auto',
        wWidthPx: p.get('w.widthPx') || '',
        // game state
        gSitekeyMode: p.get('g.sitekey') || 'present',
        gTrigger: p.get('g.trigger') || 'auto',
        gLayout: p.get('g.layout') || 'auto',
        gSize: p.get('g.size') || 'normal',
        gWidthMode: p.get('g.widthMode') || 'auto',
        gWidthPx: p.get('g.widthPx') || '',
        gHeightPx: p.get('g.heightPx') || '',
        gGame: p.get('g.game') || '@demo/simple',
        gGames: p.get('g.games') || '',
      };
    }
    function writeUrl(s) {
      const p = new URLSearchParams();
      p.set('tab', s.tab);
      Object.entries({
        'w.mode': s.wMode, 'w.trigger': s.wTrigger, 'w.size': s.wSize,
        'w.widthMode': s.wWidthMode, 'w.widthPx': s.wWidthPx,
        'g.sitekey': s.gSitekeyMode, 'g.trigger': s.gTrigger,
        'g.layout': s.gLayout, 'g.size': s.gSize,
        'g.widthMode': s.gWidthMode, 'g.widthPx': s.gWidthPx,
        'g.heightPx': s.gHeightPx, 'g.game': s.gGame, 'g.games': s.gGames,
      }).forEach(([k, v]) => { if (v) p.set(k, v); });
      history.replaceState(null, '', '?' + p.toString());
    }

    // ---------- presets ----------
    const WIDGET_PRESETS = [
      ['Simple · auto', { wMode: 'simple', wTrigger: 'auto' }],
      ['Simple · click', { wMode: 'simple', wTrigger: 'click' }],
      ['Simple · form-submit', { wMode: 'simple', wTrigger: 'form-submit' }],
      ['Simple · manual', { wMode: 'simple', wTrigger: 'manual' }],
      ['Invisible · auto', { wMode: 'invisible', wTrigger: 'auto' }],
      ['Invisible · form-submit', { wMode: 'invisible', wTrigger: 'form-submit' }],
      ['Invisible · manual', { wMode: 'invisible', wTrigger: 'manual' }],
      ['Compact', { wMode: 'simple', wTrigger: 'auto', wSize: 'compact' }],
      ['Full width', { wMode: 'simple', wTrigger: 'auto', wWidthMode: 'full' }],
      ['Custom width 500', { wMode: 'simple', wTrigger: 'auto', wWidthMode: 'pixels', wWidthPx: '500' }],
    ];

    const GAME_PRESETS = [
      ['Inline game · auto', { gSitekeyMode: 'present', gTrigger: 'auto', gLayout: 'inline', gGame: '@demo/simple' }],
      ['Modal game · click', { gSitekeyMode: 'present', gTrigger: 'click', gLayout: 'modal', gGame: '@demo/simple' }],
      ['Fullscreen game · click', { gSitekeyMode: 'present', gTrigger: 'click', gLayout: 'fullscreen', gGame: '@demo/simple' }],
      ['Layout auto', { gSitekeyMode: 'present', gTrigger: 'auto', gLayout: 'auto', gGame: '@demo/simple' }],
      ['Game · manual (customer-hosted)', { gSitekeyMode: 'present', gTrigger: 'manual', gLayout: 'inline', gGame: '' }],
      ['Game-only (no sitekey)', { gSitekeyMode: 'absent', gTrigger: 'auto', gLayout: 'inline', gGame: '@demo/simple' }],
      ['Multi-round', { gSitekeyMode: 'present', gTrigger: 'auto', gLayout: 'inline', gGame: '@demo/multi-round' }],
      ['Failing game', { gSitekeyMode: 'present', gTrigger: 'auto', gLayout: 'inline', gGame: '@demo/failing' }],
      ['Compact inline', { gSitekeyMode: 'present', gTrigger: 'auto', gLayout: 'inline', gGame: '@demo/simple', gSize: 'compact' }],
      ['Full width inline', { gSitekeyMode: 'present', gTrigger: 'auto', gLayout: 'inline', gGame: '@demo/simple', gWidthMode: 'full' }],
      ['Custom dims 500×400', { gSitekeyMode: 'present', gTrigger: 'auto', gLayout: 'inline', gGame: '@demo/simple', gWidthMode: 'pixels', gWidthPx: '500', gHeightPx: '400' }],
    ];

    // ---------- state ----------
    const state = readUrl();

    function applyStateToControls() {
      document.getElementById('w-mode').value = state.wMode;
      document.getElementById('w-trigger').value = state.wTrigger;
      document.getElementById('w-size').value = state.wSize;
      document.getElementById('w-width-mode').value = state.wWidthMode;
      document.getElementById('w-width-px').value = state.wWidthPx;
      document.getElementById('w-width-px').disabled = state.wWidthMode !== 'pixels';

      document.getElementById('g-sitekey-mode').value = state.gSitekeyMode;
      document.getElementById('g-trigger').value = state.gTrigger;
      document.getElementById('g-layout').value = state.gLayout;
      document.getElementById('g-size').value = state.gSize;
      document.getElementById('g-width-mode').value = state.gWidthMode;
      document.getElementById('g-width-px').value = state.gWidthPx;
      document.getElementById('g-width-px').disabled = state.gWidthMode !== 'pixels';
      document.getElementById('g-height-px').value = state.gHeightPx;
      document.getElementById('g-game').value = state.gGame;
      document.getElementById('g-games').value = state.gGames;
    }

    function readWidgetControls() {
      state.wMode = document.getElementById('w-mode').value;
      state.wTrigger = document.getElementById('w-trigger').value;
      state.wSize = document.getElementById('w-size').value;
      state.wWidthMode = document.getElementById('w-width-mode').value;
      state.wWidthPx = document.getElementById('w-width-px').value;
      document.getElementById('w-width-px').disabled = state.wWidthMode !== 'pixels';
    }
    function readGameControls() {
      state.gSitekeyMode = document.getElementById('g-sitekey-mode').value;
      state.gTrigger = document.getElementById('g-trigger').value;
      state.gLayout = document.getElementById('g-layout').value;
      state.gSize = document.getElementById('g-size').value;
      state.gWidthMode = document.getElementById('g-width-mode').value;
      state.gWidthPx = document.getElementById('g-width-px').value;
      document.getElementById('g-width-px').disabled = state.gWidthMode !== 'pixels';
      state.gHeightPx = document.getElementById('g-height-px').value;
      state.gGame = document.getElementById('g-game').value;
      state.gGames = document.getElementById('g-games').value;
    }

    // ---------- markup generation ----------
    function widthAttr(mode, px) {
      if (mode === 'auto') return '';
      if (mode === 'full') return ' width="full"';
      if (mode === 'pixels' && px) return ` width="${px}"`;
      return '';
    }

    function widgetMarkup() {
      let attrs = ` sitekey="${SITEKEY}" mode="${state.wMode}"`;
      if (state.wTrigger !== 'auto') attrs += ` trigger="${state.wTrigger}"`;
      if (state.wSize !== 'normal') attrs += ` size="${state.wSize}"`;
      attrs += widthAttr(state.wWidthMode, state.wWidthPx);
      return `<caputchin-widget${attrs}></caputchin-widget>`;
    }

    function gameMarkup() {
      let attrs = '';
      if (state.gSitekeyMode === 'present') attrs += ` sitekey="${SITEKEY}"`;
      if (state.gTrigger !== 'auto') attrs += ` trigger="${state.gTrigger}"`;
      if (state.gLayout !== 'auto') attrs += ` layout="${state.gLayout}"`;
      if (state.gSize !== 'normal') attrs += ` size="${state.gSize}"`;
      attrs += widthAttr(state.gWidthMode, state.gWidthPx);
      if (state.gHeightPx) attrs += ` height="${state.gHeightPx}"`;
      if (state.gGames) attrs += ` games="${state.gGames}"`;
      else if (state.gGame) attrs += ` game="${state.gGame}"`;
      return `<caputchin-game${attrs}></caputchin-game>`;
    }

    function refreshCodePreviews() {
      document.getElementById('w-code').textContent = widgetMarkup();
      document.getElementById('g-code').textContent = gameMarkup();
    }

    // ---------- logging ----------
    function makeLogger(logEl) {
      logEl.textContent = '';
      return (kind, payload) => {
        const ts = new Date().toLocaleTimeString('en-GB', { hour12: false }) + '.' + String(Date.now() % 1000).padStart(3, '0');
        const line = document.createElement('div');
        line.innerHTML =
          `<span class="ts">[${ts}]</span><span class="ev-${kind}">${kind}</span> ` +
          (payload === undefined ? '' : JSON.stringify(payload));
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      };
    }

    // ---------- mounting ----------
    function loadGameScript(gameId) {
      if (!gameId || !GAME_SRC[gameId]) return Promise.resolve();
      if (document.querySelector(`script[data-game="${gameId}"]`)) return Promise.resolve();
      return new Promise((resolve) => {
        const s = document.createElement('script');
        s.src = GAME_SRC[gameId];
        s.dataset.game = gameId;
        s.onload = resolve; s.onerror = resolve;
        document.head.appendChild(s);
      });
    }

    async function mountWidget() {
      const mountEl = document.getElementById('w-mount');
      mountEl.textContent = '';
      const log = makeLogger(document.getElementById('w-log'));

      const markup = widgetMarkup();
      const wrap = (state.wTrigger === 'form-submit')
        ? `<form id="w-form"><input type="text" placeholder="some field" required />${markup}<button type="submit">Submit</button></form>`
        : markup;
      mountEl.insertAdjacentHTML('beforeend', wrap);

      const el = mountEl.querySelector('caputchin-widget');
      ['start', 'pass', 'nickname', 'error', 'layout-resolved'].forEach((evt) => {
        el.addEventListener(evt, (e) => log(evt, e.detail));
      });
      const form = mountEl.querySelector('form');
      if (form) form.addEventListener('submit', (e) => { e.preventDefault(); log('submit', { ok: true }); });

      if (state.wTrigger === 'manual') {
        const controls = document.createElement('div');
        controls.className = 'manual-controls';
        controls.innerHTML = `<button id="w-mstart">widget.start()</button>`;
        mountEl.appendChild(controls);
        document.getElementById('w-mstart').onclick = () => el.start();
      }

      log('start', { _note: 'remount — settings applied' });
    }

    async function mountGame() {
      const mountEl = document.getElementById('g-mount');
      mountEl.textContent = '';
      const log = makeLogger(document.getElementById('g-log'));

      await loadGameScript(state.gGame);
      if (state.gGames) {
        for (const g of state.gGames.split(',').map((s) => s.trim()).filter(Boolean)) {
          await loadGameScript(g);
        }
      }

      const markup = gameMarkup();
      const wrap = (state.gTrigger === 'form-submit')
        ? `<form id="g-form"><input type="text" placeholder="some field" required />${markup}<button type="submit">Submit</button></form>`
        : markup;
      mountEl.insertAdjacentHTML('beforeend', wrap);

      const el = mountEl.querySelector('caputchin-game');
      ['start', 'pass', 'nickname', 'error', 'layout-resolved'].forEach((evt) => {
        el.addEventListener(evt, (e) => log(evt, e.detail));
      });
      const form = mountEl.querySelector('form');
      if (form) form.addEventListener('submit', (e) => { e.preventDefault(); log('submit', { ok: true }); });

      if (state.gTrigger === 'manual' && state.gSitekeyMode === 'present') {
        const controls = document.createElement('div');
        controls.className = 'manual-controls';
        controls.innerHTML = `
          <button id="g-mstart">widget.start()</button>
          <button id="g-mpass">widget.pass({score:0.85})</button>
        `;
        mountEl.appendChild(controls);
        document.getElementById('g-mstart').onclick = () => el.start();
        document.getElementById('g-mpass').onclick = () => el.pass({ score: 0.85, durationMs: 1200 });
      }

      log('start', { _note: 'remount — settings applied' });
    }

    // ---------- presets render ----------
    function renderPresets(rootId, list, applyFn) {
      const root = document.getElementById(rootId);
      root.textContent = '';
      for (const [label, patch] of list) {
        const b = document.createElement('button');
        b.className = 'preset'; b.type = 'button'; b.textContent = label;
        b.onclick = () => { applyFn(patch); };
        root.appendChild(b);
      }
    }

    function applyWidgetPreset(patch) {
      Object.assign(state, patch);
      applyStateToControls();
      refreshCodePreviews();
      writeUrl(state);
      mountWidget();
    }
    function applyGamePreset(patch) {
      Object.assign(state, patch);
      applyStateToControls();
      refreshCodePreviews();
      writeUrl(state);
      mountGame();
    }

    // ---------- tab switching ----------
    function setTab(name) {
      state.tab = name;
      document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('active', t.dataset.tab === name));
      document.querySelectorAll('.panel').forEach((p) => p.classList.toggle('active', p.id === `panel-${name}`));
      writeUrl(state);
    }

    // ---------- wire ----------
    document.getElementById('tabs').addEventListener('click', (e) => {
      if (e.target.matches('.tab')) setTab(e.target.dataset.tab);
    });

    ['w-mode','w-trigger','w-size','w-width-mode','w-width-px'].forEach((id) => {
      document.getElementById(id).addEventListener('input', () => { readWidgetControls(); refreshCodePreviews(); });
    });
    ['g-sitekey-mode','g-trigger','g-layout','g-size','g-width-mode','g-width-px','g-height-px','g-game','g-games'].forEach((id) => {
      document.getElementById(id).addEventListener('input', () => { readGameControls(); refreshCodePreviews(); });
    });

    document.getElementById('w-apply').onclick = () => {
      readWidgetControls(); refreshCodePreviews(); writeUrl(state); mountWidget();
    };
    document.getElementById('g-apply').onclick = () => {
      readGameControls(); refreshCodePreviews(); writeUrl(state); mountGame();
    };
    document.getElementById('w-reset').onclick = () => {
      Object.assign(state, {
        wMode: 'simple', wTrigger: 'auto', wSize: 'normal', wWidthMode: 'auto', wWidthPx: '',
      });
      applyStateToControls(); refreshCodePreviews(); writeUrl(state); mountWidget();
    };
    document.getElementById('g-reset').onclick = () => {
      Object.assign(state, {
        gSitekeyMode: 'present', gTrigger: 'auto', gLayout: 'auto', gSize: 'normal',
        gWidthMode: 'auto', gWidthPx: '', gHeightPx: '', gGame: '@demo/simple', gGames: '',
      });
      applyStateToControls(); refreshCodePreviews(); writeUrl(state); mountGame();
    };
    document.querySelectorAll('.copy').forEach((b) => {
      b.onclick = () => {
        const txt = b.dataset.copy === 'widget' ? widgetMarkup() : gameMarkup();
        navigator.clipboard.writeText(txt);
      };
    });

    renderPresets('widget-presets', WIDGET_PRESETS, applyWidgetPreset);
    renderPresets('game-presets', GAME_PRESETS, applyGamePreset);
    applyStateToControls();
    refreshCodePreviews();
    setTab(state.tab);

    // initial mount of both — script tag below registers both elements
    window.addEventListener('DOMContentLoaded', () => {
      mountWidget();
      mountGame();
    });
  </script>
  <script src="/packages/widget/dist/all.js"></script>
</body>
</html>
