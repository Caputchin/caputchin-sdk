<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caputchin Widget — Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 1.5rem;
      background: #f8f7ff;
      color: #1a0a2e;
      max-width: 56rem;
      margin: 0 auto;
    }
    h1 { color: #3d2a5e; margin-bottom: 0.25rem; }
    p.subtitle { color: #6a4c93; margin-top: 0; margin-bottom: 1.5rem; font-size: 0.9rem; }
    h2 { margin: 1.5rem 0 0.5rem; font-size: 1rem; color: #3d2a5e; border-bottom: 1px solid #e0d9f5; padding-bottom: 0.25rem; }

    .section {
      background: #fff;
      border: 1px solid #e0d9f5;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }

    /* presets */
    .presets { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .preset {
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      border: 1px solid #6a4c93;
      background: #fff;
      color: #3d2a5e;
      border-radius: 999px;
      cursor: pointer;
    }
    .preset:hover { background: #f0ebff; }

    /* controls grid */
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr));
      gap: 0.75rem 1rem;
    }
    .field { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.8rem; }
    .field label { color: #555; font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .field select, .field input, .field textarea {
      font: inherit;
      font-size: 0.85rem;
      padding: 0.4rem 0.5rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
    }
    .field textarea { min-height: 2.5rem; resize: vertical; }
    .row { display: flex; gap: 0.5rem; align-items: center; }
    .row input[type="number"] { flex: 1 1 auto; }
    .row select { flex: 0 0 auto; }

    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }
    .actions button {
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 0;
      cursor: pointer;
    }
    button.primary { background: #2F6640; color: #fff; }
    button.primary:hover { background: #1f4a2c; }
    button.secondary { background: #fff; color: #3d2a5e; border: 1px solid #6a4c93; }
    button.secondary:hover { background: #f0ebff; }

    /* code preview */
    .code {
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 0.75rem;
      background: #f5f3fa;
      border: 1px solid #ebe5fa;
      border-radius: 6px;
      padding: 0.6rem 0.75rem;
      color: #2b1a4d;
      white-space: pre-wrap;
      word-break: break-all;
      position: relative;
    }
    .code .copy {
      position: absolute;
      top: 0.4rem;
      right: 0.4rem;
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      border: 1px solid #6a4c93;
      background: #fff;
      color: #3d2a5e;
      cursor: pointer;
    }

    /* widget preview area */
    #widget-mount {
      padding: 1rem;
      border: 1px dashed #c0b8d4;
      border-radius: 6px;
      background: #fafaff;
      min-height: 5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    #widget-mount form { display: flex; flex-direction: column; gap: 0.5rem; }
    #widget-mount form input[type="text"] {
      border: 1px solid #ccc; border-radius: 6px; padding: 0.4rem 0.6rem; font-size: 0.85rem;
      max-width: 16rem;
    }
    #widget-mount form button[type="submit"] {
      padding: 0.4rem 0.8rem; font-size: 0.85rem; background: #2F6640; color: #fff; border: 0; border-radius: 6px; cursor: pointer;
      max-width: 8rem;
    }
    .manual-controls { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .manual-controls button {
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      border: 1px solid #6a4c93;
      background: #fff;
      color: #3d2a5e;
      border-radius: 6px;
      cursor: pointer;
    }

    /* log */
    .log {
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 0.7rem;
      background: #1A1917;
      color: #E0F2DA;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      min-height: 6rem;
      max-height: 20rem;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log .ts { color: #aaa; margin-right: 0.4rem; }
    .log .ev-start { color: #82cfff; }
    .log .ev-pass { color: #6fe86f; }
    .log .ev-nickname { color: #ffc870; }
    .log .ev-error { color: #ff7070; }
    .log .ev-layout-resolved { color: #c0a8ff; }
    .log .ev-submit { color: #aaa; }
  </style>
</head>
<body>
  <h1>Caputchin Widget Playground</h1>
  <p class="subtitle">
    One widget, every setting selectable. Pick a preset to jump in. Sitekey:
    <code>cpt_pub_WVQVqTdVl92Sh_bxokoz_wCw</code>.
  </p>

  <!-- ============ PRESETS ============ -->
  <section class="section">
    <h2>Presets</h2>
    <div class="presets" id="presets"></div>
  </section>

  <!-- ============ CONTROLS ============ -->
  <section class="section">
    <h2>Settings</h2>
    <div class="controls">
      <div class="field">
        <label for="ctrl-mode">mode</label>
        <select id="ctrl-mode">
          <option value="invisible">invisible</option>
          <option value="simple" selected>simple</option>
          <option value="game">game</option>
          <option value="game-only">game-only</option>
        </select>
      </div>
      <div class="field">
        <label for="ctrl-trigger">trigger</label>
        <select id="ctrl-trigger">
          <option value="auto" selected>auto</option>
          <option value="click">click</option>
          <option value="form-submit">form-submit</option>
          <option value="manual">manual</option>
        </select>
      </div>
      <div class="field">
        <label for="ctrl-layout">layout</label>
        <select id="ctrl-layout">
          <option value="">(unset)</option>
          <option value="inline">inline</option>
          <option value="modal">modal</option>
          <option value="fullscreen">fullscreen</option>
          <option value="auto">auto</option>
        </select>
      </div>
      <div class="field">
        <label for="ctrl-size">size</label>
        <select id="ctrl-size">
          <option value="normal" selected>normal</option>
          <option value="compact">compact</option>
        </select>
      </div>
      <div class="field">
        <label for="ctrl-width">width</label>
        <div class="row">
          <select id="ctrl-width-mode">
            <option value="auto" selected>auto</option>
            <option value="full">full</option>
            <option value="pixels">pixels</option>
          </select>
          <input id="ctrl-width-px" type="number" min="1" placeholder="e.g. 500" disabled />
        </div>
      </div>
      <div class="field">
        <label for="ctrl-height-px">height (px, blank = default)</label>
        <input id="ctrl-height-px" type="number" min="1" placeholder="e.g. 300" />
      </div>
      <div class="field">
        <label for="ctrl-game">game</label>
        <select id="ctrl-game">
          <option value="">(none)</option>
          <option value="@demo/simple">@demo/simple — click 3x to pass</option>
          <option value="@demo/multi-round">@demo/multi-round — 3 rounds, score per round</option>
          <option value="@demo/failing">@demo/failing — fires bridge.error after 1.5s</option>
        </select>
      </div>
      <div class="field">
        <label for="ctrl-games">games (comma-sep, overrides game)</label>
        <textarea id="ctrl-games" placeholder="@demo/simple,@demo/multi-round"></textarea>
      </div>
    </div>
    <div class="actions">
      <button class="primary" id="btn-apply">Apply &amp; remount</button>
      <button class="secondary" id="btn-reset">Reset to defaults</button>
    </div>
  </section>

  <!-- ============ CODE PREVIEW ============ -->
  <section class="section">
    <h2>Markup</h2>
    <div class="code" id="code-preview"><button class="copy" id="btn-copy">copy</button><span id="code-content"></span></div>
  </section>

  <!-- ============ WIDGET PREVIEW ============ -->
  <section class="section">
    <h2>Widget</h2>
    <div id="widget-mount"></div>
  </section>

  <!-- ============ EVENT LOG ============ -->
  <section class="section">
    <h2>Events</h2>
    <div class="log" id="log"></div>
  </section>

  <script>
    // ---------------- defaults ----------------
    const DEFAULTS = {
      mode: 'simple',
      trigger: 'auto',
      layout: '',
      size: 'normal',
      widthMode: 'auto',
      widthPx: '',
      heightPx: '',
      game: '',
      games: '',
    };

    const SITEKEY = 'cpt_pub_WVQVqTdVl92Sh_bxokoz_wCw';

    const GAME_SRC = {
      '@demo/simple': '/examples/simple-game.js',
      '@demo/multi-round': '/examples/multi-round-game.js',
      '@demo/failing': '/examples/failing-game.js',
    };

    // ---------------- presets ----------------
    const PRESETS = [
      { label: 'Simple · auto', cfg: { mode: 'simple', trigger: 'auto' } },
      { label: 'Simple · click', cfg: { mode: 'simple', trigger: 'click' } },
      { label: 'Simple · form-submit', cfg: { mode: 'simple', trigger: 'form-submit' } },
      { label: 'Simple · manual', cfg: { mode: 'simple', trigger: 'manual' } },
      { label: 'Invisible · auto', cfg: { mode: 'invisible', trigger: 'auto' } },
      { label: 'Inline game', cfg: { mode: 'game', trigger: 'auto', layout: 'inline', game: '@demo/simple' } },
      { label: 'Modal game', cfg: { mode: 'game', trigger: 'auto', layout: 'modal', game: '@demo/simple' } },
      { label: 'Fullscreen game', cfg: { mode: 'game', trigger: 'click', layout: 'fullscreen', game: '@demo/simple' } },
      { label: 'Game · manual (customer-hosted)', cfg: { mode: 'game', trigger: 'manual' } },
      { label: 'Game-only (no cap)', cfg: { mode: 'game-only', game: '@demo/simple' } },
      { label: 'Multi-round', cfg: { mode: 'game', trigger: 'auto', layout: 'inline', game: '@demo/multi-round' } },
      { label: 'Failing game', cfg: { mode: 'game', trigger: 'auto', layout: 'inline', game: '@demo/failing' } },
      { label: 'Compact', cfg: { mode: 'simple', trigger: 'auto', size: 'compact' } },
      { label: 'Full width', cfg: { mode: 'simple', trigger: 'auto', widthMode: 'full' } },
      { label: 'Custom dims (500×400)', cfg: { mode: 'game', trigger: 'auto', layout: 'inline', game: '@demo/simple', widthMode: 'pixels', widthPx: '500', heightPx: '400' } },
    ];

    // ---------------- DOM refs ----------------
    const $ = (id) => document.getElementById(id);
    const ctrlMode = $('ctrl-mode');
    const ctrlTrigger = $('ctrl-trigger');
    const ctrlLayout = $('ctrl-layout');
    const ctrlSize = $('ctrl-size');
    const ctrlWidthMode = $('ctrl-width-mode');
    const ctrlWidthPx = $('ctrl-width-px');
    const ctrlHeightPx = $('ctrl-height-px');
    const ctrlGame = $('ctrl-game');
    const ctrlGames = $('ctrl-games');
    const codeContent = $('code-content');
    const mount = $('widget-mount');
    const log = $('log');
    const presetsBox = $('presets');

    // ---------------- state ----------------
    function readControls() {
      return {
        mode: ctrlMode.value,
        trigger: ctrlTrigger.value,
        layout: ctrlLayout.value,
        size: ctrlSize.value,
        widthMode: ctrlWidthMode.value,
        widthPx: ctrlWidthPx.value,
        heightPx: ctrlHeightPx.value,
        game: ctrlGame.value,
        games: ctrlGames.value.trim(),
      };
    }
    function writeControls(cfg) {
      const merged = { ...DEFAULTS, ...cfg };
      ctrlMode.value = merged.mode;
      ctrlTrigger.value = merged.trigger;
      ctrlLayout.value = merged.layout;
      ctrlSize.value = merged.size;
      ctrlWidthMode.value = merged.widthMode;
      ctrlWidthPx.value = merged.widthPx;
      ctrlHeightPx.value = merged.heightPx;
      ctrlGame.value = merged.game;
      ctrlGames.value = merged.games;
      ctrlWidthPx.disabled = merged.widthMode !== 'pixels';
      syncCodePreview();
    }

    function configToAttrs(cfg) {
      const attrs = { sitekey: SITEKEY, mode: cfg.mode };
      if (cfg.trigger && cfg.trigger !== 'auto') attrs.trigger = cfg.trigger;
      if (cfg.layout) attrs.layout = cfg.layout;
      if (cfg.size && cfg.size !== 'normal') attrs.size = cfg.size;
      if (cfg.widthMode === 'full') attrs.width = 'full';
      else if (cfg.widthMode === 'pixels' && cfg.widthPx) attrs.width = cfg.widthPx;
      if (cfg.heightPx) attrs.height = cfg.heightPx;
      if (cfg.games) {
        attrs.games = cfg.games;
        if (GAME_SRC[cfg.games.split(',')[0].trim()]) attrs['game-src'] = GAME_SRC[cfg.games.split(',')[0].trim()];
      } else if (cfg.game) {
        attrs.game = cfg.game;
        if (GAME_SRC[cfg.game]) attrs['game-src'] = GAME_SRC[cfg.game];
      }
      return attrs;
    }

    function attrsToMarkup(attrs) {
      const parts = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`);
      return `<caputchin-widget ${parts.join(' ')}></caputchin-widget>`;
    }

    function syncCodePreview() {
      const cfg = readControls();
      codeContent.textContent = attrsToMarkup(configToAttrs(cfg));
      writeUrl(cfg);
    }

    // ---------------- URL persistence ----------------
    function readUrl() {
      const params = new URLSearchParams(location.search);
      const cfg = { ...DEFAULTS };
      for (const k of Object.keys(DEFAULTS)) {
        if (params.has(k)) cfg[k] = params.get(k);
      }
      return cfg;
    }
    function writeUrl(cfg) {
      const params = new URLSearchParams();
      for (const [k, v] of Object.entries(cfg)) {
        if (v !== DEFAULTS[k] && v !== '') params.set(k, v);
      }
      const query = params.toString();
      history.replaceState(null, '', location.pathname + (query ? '?' + query : ''));
    }

    // ---------------- log ----------------
    function append(kind, detail) {
      const ts = new Date().toISOString().slice(11, 23);
      const line = document.createElement('div');
      const tsSpan = document.createElement('span');
      tsSpan.className = 'ts';
      tsSpan.textContent = '[' + ts + ']';
      const ev = document.createElement('span');
      ev.className = 'ev-' + kind;
      ev.textContent = kind;
      line.appendChild(tsSpan);
      line.appendChild(document.createTextNode(' '));
      line.appendChild(ev);
      line.appendChild(document.createTextNode(' ' + JSON.stringify(detail ?? {})));
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    // ---------------- mount / remount ----------------
    const EVENTS = ['start', 'pass', 'nickname', 'error', 'layout-resolved'];

    function remount() {
      mount.innerHTML = '';
      log.innerHTML = '';
      append('start', { _note: 'remount — settings applied' });

      const cfg = readControls();
      const attrs = configToAttrs(cfg);
      const widget = document.createElement('caputchin-widget');
      for (const [k, v] of Object.entries(attrs)) widget.setAttribute(k, v);
      widget.id = 'w-playground';

      // Wire listeners BEFORE upgrade (script tag at bottom upgrades elements; the
      // widget is created here AFTER script loaded, so addEventListener works fine).
      EVENTS.forEach((ev) => {
        widget.addEventListener(ev, (e) => append(ev, e.detail));
      });

      // Trigger-specific wrapper: form-submit needs a <form>; manual gets buttons.
      let container = mount;
      if (cfg.trigger === 'form-submit') {
        const form = document.createElement('form');
        form.id = 'pg-form';
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          append('submit', { form: 'pg-form' });
        });
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'sample form field';
        const btn = document.createElement('button');
        btn.type = 'submit';
        btn.textContent = 'Submit';
        form.appendChild(widget);
        form.appendChild(input);
        form.appendChild(btn);
        mount.appendChild(form);
      } else {
        mount.appendChild(widget);
      }

      const showManual = cfg.trigger === 'manual' || (cfg.mode === 'game' && cfg.trigger === 'manual');
      if (showManual) {
        const ctrls = document.createElement('div');
        ctrls.className = 'manual-controls';
        const start = document.createElement('button');
        start.textContent = 'widget.start()';
        start.addEventListener('click', () => widget.start());
        ctrls.appendChild(start);

        if (cfg.mode === 'game') {
          const pass = document.createElement('button');
          pass.textContent = 'widget.pass({score:0.9, durationMs:4200})';
          pass.addEventListener('click', () => widget.pass({ score: 0.9, durationMs: 4200 }));
          ctrls.appendChild(pass);
        }

        const nick = document.createElement('button');
        nick.textContent = 'widget.setNickname("ABC")';
        nick.addEventListener('click', () => {
          try { widget.setNickname('ABC'); }
          catch (err) { append('error', { code: 'method-threw', message: String(err) }); }
        });
        ctrls.appendChild(nick);

        mount.appendChild(ctrls);
      }
    }

    // ---------------- wire UI ----------------
    function wire() {
      // Sync code preview as user types (predictive, not remount).
      [ctrlMode, ctrlTrigger, ctrlLayout, ctrlSize, ctrlGame, ctrlGames, ctrlHeightPx, ctrlWidthPx].forEach((el) => {
        el.addEventListener('input', syncCodePreview);
        el.addEventListener('change', syncCodePreview);
      });
      ctrlWidthMode.addEventListener('change', () => {
        ctrlWidthPx.disabled = ctrlWidthMode.value !== 'pixels';
        syncCodePreview();
      });

      $('btn-apply').addEventListener('click', remount);
      $('btn-reset').addEventListener('click', () => {
        writeControls(DEFAULTS);
        remount();
      });
      $('btn-copy').addEventListener('click', () => {
        navigator.clipboard.writeText(codeContent.textContent || '');
      });

      // Presets
      PRESETS.forEach((preset) => {
        const btn = document.createElement('button');
        btn.className = 'preset';
        btn.textContent = preset.label;
        btn.addEventListener('click', () => {
          writeControls(preset.cfg);
          remount();
        });
        presetsBox.appendChild(btn);
      });
    }

    // ---------------- init ----------------
    wire();
    writeControls(readUrl());
    remount();
  </script>
  <script src="/packages/widget/dist/widget.js"></script>
</body>
</html>
